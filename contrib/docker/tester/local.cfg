# Compile with debug checks, but also with optimizations to make tests run fast
NATIVE_OPTIMIZATIONS=OFF
DEAL_II_CONFOPTS="-DDEAL_II_WITH_COMPLEX_VALUES=OFF -DCMAKE_BUILD_TYPE='Debug' -DDEAL_II_CXX_FLAGS_DEBUG='-ggdb -Wa,--compress-debug-sections -O3' -DDEAL_II_COMPONENT_EXAMPLES=OFF"

# Minimize memory requirement and compile time
TRILINOS_CONFOPTS="-DTrilinos_ENABLE_COMPLEX_DOUBLE:BOOL=OFF -DTpetra_INST_COMPLEX_DOUBLE:BOOL=OFF -DTpetra_INST_COMPLEX_FLOAT:BOOL=OFF -DTeuchos_ENABLE_COMPLEX:BOOL=OFF -DTrilinos_SHOW_DEPRECATED_WARNINGS:BOOL=OFF -DTrilinos_ENABLE_EXPLICIT_INSTANTIATION=ON"

# Compile minimal packages necessary for all ASPECT functionality
PACKAGES="once:astyle once:hdf5 once:p4est once:trilinos dealii"
